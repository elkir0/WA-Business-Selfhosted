# Example Nginx config for WA-Business-Selfhosted.
#
# - Edit `server_name` and the certificate paths.
# - Adjust the `proxy_pass` port if you changed PORT in .env.
# - The /api/events location is split out so SSE stays alive for 24h.
#
# This vhost assumes the gateway runs locally on port 3100.

upstream wa_selfhosted {
    server 127.0.0.1:3100;
    keepalive 16;
}

# HTTP → HTTPS redirect (handled separately if certbot --nginx wrote one for you)
server {
    listen 80;
    listen [::]:80;
    server_name wa-api.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wa-api.example.com;

    ssl_certificate     /etc/letsencrypt/live/wa-api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wa-api.example.com/privkey.pem;

    # Strong TLS defaults — adjust to your policy.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!3DES;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Hide the upstream identity. The gateway uses Helmet to set sane headers;
    # this strips any nginx defaults that might leak versions.
    server_tokens off;
    proxy_hide_header X-Powered-By;

    # Standard security headers (the gateway also sets these via Helmet, but
    # nginx-side is a defense-in-depth).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "DENY"    always;
    add_header Referrer-Policy        "no-referrer" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Body size cap (raise if you upload large media via /api/media/...)
    client_max_body_size 20m;

    # ── SSE event stream ──
    # Long-lived. Disable buffering, allow 24h response time.
    location /api/events {
        proxy_pass         http://wa_selfhosted;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;
        chunked_transfer_encoding on;
    }

    # ── Everything else (REST API + webhook) ──
    location / {
        proxy_pass         http://wa_selfhosted;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Optional: redact Bearer tokens from access logs (defense-in-depth).
    # Requires the nginx 'string-replacement' or a logging variant — keep your
    # access logs anyway as separate concern.
}
